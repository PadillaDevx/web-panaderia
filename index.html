<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panadería artesanal. Pan recién horneado con recetas tradicionales desde 1985.">
    <title>Panadería José — Pan artesanal hecho con amor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <main>

        <!-- ════════════════════════════════════════════════════════
         HERO
         ════════════════════════════════════════════════════════ -->
        <section id="inicio" class="hero grid grid--split-hero" aria-label="Sección principal">

            <div class="hero__left">
                <div class="hero__brand" data-hero-brand></div>
                <span class="badge" data-hero-badge></span>
                <h1 class="hero__title" data-hero-title></h1>
                <div class="hero__divider" aria-hidden="true"></div>
                <p class="hero__subtitle" data-hero-subtitle></p>

                <div class="hero__buttons">
                    <a class="btn btn--whatsapp" data-hero-cta-primary href="#">
                        <span aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                fill="currentColor" width="18" height="18">
                                <path
                                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                            </svg></span>
                        <span data-label></span>
                    </a>
                    <a class="btn btn--ghost" data-hero-cta-secondary href="#"></a>
                </div>
            </div>

            <div class="hero__right" aria-hidden="true">
                <div class="orbit" data-hero-orbit></div>
            </div>

        </section>

        <!-- ════════════════════════════════════════════════════════
         STRIP animado
         ════════════════════════════════════════════════════════ -->
        <div class="strip" role="presentation" aria-hidden="true">
            <div class="strip__track" data-strip-track></div>
        </div>

        <!-- ════════════════════════════════════════════════════════
         GALERÍA
         ════════════════════════════════════════════════════════ -->
        <section id="galeria" class="section" aria-label="Galería de productos">
            <div class="section__header" data-animate>
                <span class="eyebrow" data-gallery-eyebrow></span>
                <h2 class="section__title" data-gallery-title></h2>
                <div class="section__bar" aria-hidden="true"></div>
            </div>

            <div class="gallery" data-gallery data-animate></div>
        </section>

        <!-- ════════════════════════════════════════════════════════
         NOSOTROS
         ════════════════════════════════════════════════════════ -->
        <section id="nosotros" class="about grid grid--nosotros" aria-label="Nuestra historia">

            <div class="about__media" data-about-media>
                <div class="about__phrases" data-about-phrases aria-hidden="true"></div>
            </div>

            <div class="about__content" data-animate>
                <span class="eyebrow" data-about-eyebrow></span>
                <h2 class="about__title" data-about-title></h2>
                <blockquote class="about__quote" data-about-quote></blockquote>
                <p class="about__text" data-about-text></p>
                <span class="about__signature" data-about-signature></span>
            </div>

        </section>

        <!-- ════════════════════════════════════════════════════════
         CONTACTO
         ════════════════════════════════════════════════════════ -->
        <section id="contacto" class="contact grid grid--contacto" aria-label="Contacto" data-animate>

            <div class="contact__left">
                <span class="eyebrow eyebrow--light" data-contact-eyebrow></span>
                <h2 class="contact__title" data-contact-title></h2>
                <p class="contact__subtitle" data-contact-subtitle></p>
            </div>

            <div class="contact__right">
                <a class="btn btn--whatsapp btn--lg" data-contact-cta href="#"></a>
                <div class="contact__rows" data-contact-rows></div>
            </div>

        </section>

    </main>

    <!-- ════════════════════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════════════════════ -->
    <footer class="footer" role="contentinfo">
        <span class="footer__brand" data-footer-brand></span>
        <div class="footer__socials" data-footer-socials></div>
        <span class="footer__meta" data-footer-meta></span>
    </footer>

    <noscript>
        <p style="text-align:center;padding:2rem;">
            Habilita JavaScript para ver el contenido completo de la página.
        </p>
    </noscript>

    <script type="module" src="js/pages/home.js"></script>

</body>

</html>
